name: Production CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check Syntax & Run Audit Suite
        run: |
          node -c server.js
          node -c app.js
          node scripts/production.test.js

  frontend-ci:
    name: Frontend Lint & Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run Production Bundle Build
        run: npm run build

  k8s-validation:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate K8s Manifests
        run: node k8s/validate_k8s.js

  docker-build:
    name: Docker Image Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: docker build -t hiremate-backend:latest -f Dockerfile.backend .

      - name: Build Frontend Docker Image
        run: docker build -t hiremate-frontend:latest -f Dockerfile.frontend .
