apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: hiremate-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: hiremate-prod
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
