global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hiremate-backend'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['localhost:5000', 'localhost:5999']
        labels:
          environment: 'production'
          service: 'hiremate-api'
